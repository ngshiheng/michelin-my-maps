name: Semantic Release

on:
    push:
        branches:
            - main
    pull_request_target:
        types: [opened, synchronize, reopened]
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.event_name == 'pull_request_target' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
            - name: Run tests
              run: make test

    preview:
        if: github.event_name == 'pull_request_target'
        runs-on: ubuntu-latest
        needs: [test]
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: refs/pull/${{ github.event.pull_request.number }}/merge

            - name: Run semantic-release (dry run)
              uses: go-semantic-release/action@v1
              id: semrel
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  dry: true

            - name: Post version preview comment
              uses: peter-evans/create-or-update-comment@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  issue-number: ${{ github.event.pull_request.number }}
                  body: |
                      ### Release Preview
                      Merging this PR will release version: **v${{ steps.semrel.outputs.version }}**

    release:
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        needs: [test]
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Run semantic-release
              uses: go-semantic-release/action@v1
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
